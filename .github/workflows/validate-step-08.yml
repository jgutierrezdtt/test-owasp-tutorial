name: Validate Step 08

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/java/src/main/java/com/example/api/controller/TokenController.java
      - .tutorial/state.env
      - .tutorial-started

jobs:
  validate:
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-step.yml
    with:
      step_number: '08'