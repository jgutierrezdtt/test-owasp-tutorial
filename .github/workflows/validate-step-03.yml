name: Validate Step 03

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/python/routes/render.py
      - .tutorial/state.env
      - .tutorial-started

jobs:
  validate:
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-step.yml
    with:
      step_number: '03'