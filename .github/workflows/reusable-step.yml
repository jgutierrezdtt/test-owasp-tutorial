name: Reusable Step Validation

on:
  workflow_call:
    inputs:
      step_number:
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto-iniciar tutorial si no ha comenzado
        run: |
          if [ ! -f .tutorial-started ]; then
            bash scripts/tutorial.sh start
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md .tutorial/state.env .tutorial-started
            git commit -m "progress: tutorial iniciado [skip ci]"
            git push
          fi

      - name: Comprobar codigo del paso ${{ inputs.step_number }}
        run: bash scripts/tutorial.sh check-only "${{ inputs.step_number }}"

      - name: Avanzar estado del tutorial
        run: bash scripts/tutorial.sh validate-step "${{ inputs.step_number }}"

      - name: Commit tutorial state
        run: |
          if git diff --quiet -- README.md .tutorial/state.env .tutorial-started; then
            echo "No hay cambios de progreso para confirmar"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .tutorial/state.env .tutorial-started
          git commit -m "progress: paso ${{ inputs.step_number }} validado [skip ci]"
          git push