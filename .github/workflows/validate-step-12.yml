name: Validate Step 12

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/go/handlers/upload.go
      - .tutorial/state.env
      - .tutorial-started

jobs:
  validate:
    permissions:
      contents: write
    uses: ./.github/workflows/reusable-step.yml
    with:
      step_number: '12'